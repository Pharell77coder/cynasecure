services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  backoffice:
    build: ./backoffice
    ports:
      - "3001:3001"

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: cynasecure_db

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8080:80"